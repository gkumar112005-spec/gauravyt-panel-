<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gauravyt Panel</title>

<style>
/* --- GLOBAL EXACT MATCH & SMOOTH OPTIMIZATIONS --- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  -webkit-tap-highlight-color: transparent; /* Removes mobile tap highlight */
}

/* Hide scrollbars for native app look */
::-webkit-scrollbar {
  display: none;
}
* {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

body, html {
  height: 100%;
  height: 100dvh; /* Dynamic viewport for mobile browser UI jumps */
  width: 100vw;
  background: #0d121c; 
  color: #f8fafc;
  overflow: hidden; 
  display: flex;
  flex-direction: column;
}

/* Base App Container */
.app-container {
  width: 100%;
  max-width: 450px;
  height: 100%;
  margin: 0 auto;
  position: relative;
  background: #0f1523; 
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
}

/* --- SMOOTH VIEW TRANSITIONS --- */
.view-section {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(85px + env(safe-area-inset-bottom)); /* iOS safe area fix */
  animation: fadeInSmooth 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

.view-section.active {
  display: flex;
}

@keyframes fadeInSmooth {
  from { opacity: 0; transform: translateY(15px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- TOP HEADERS --- */
.header {
  padding: calc(40px + env(safe-area-inset-top)) 20px 20px 20px;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.header-gold { color: #eab308; }
.header-white { color: #ffffff; }

.header-about {
  justify-content: flex-start;
  font-size: 14px;
  color: #94a3b8;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding-bottom: 10px;
}
.back-btn {
  background: none; border: none; color: #94a3b8; cursor: pointer;
  display: flex; align-items: center; padding-right: 10px; transition: transform 0.2s;
}
.back-btn:active { transform: translateX(-4px); color: #fff; }

/* --- MAIN LOGIN CARD (LEFT SCREEN) --- */
.login-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* PERFECT CENTERING FIX */
  width: 100%;
  padding: 0 20px;
  padding-bottom: 30px;
}

.login-card {
  width: 100%;
  max-width: 350px;
  background: #1b2333; 
  padding: 40px 25px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.05);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Golden Key Box */
.icon-box {
  background: linear-gradient(135deg, #2a2d33, #1a1c22);
  width: 80px; height: 80px;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #eab308;
  box-shadow: 0 0 25px rgba(234, 179, 8, 0.2), inset 0 0 15px rgba(234, 179, 8, 0.1);
  margin-bottom: 25px;
}
.icon-box svg { color: #eab308; width: 40px; height: 40px; }

.login-card h2 {
  font-size: 16px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 25px;
  letter-spacing: 0.5px;
}

/* Inputs */
.input-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 16px 45px 16px 20px; 
  background: #101622;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  color: #fff;
  font-size: 16px; /* iOS zoom fix */
  outline: none;
  transition: all 0.3s ease;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
input::placeholder { color: #64748b; font-size: 14px; }
input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), inset 0 2px 4px rgba(0,0,0,0.2); }

.input-icon-right, .input-icon-left {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
}
.input-icon-right { right: 15px; }
.input-icon-left { left: 15px; }
.has-left-icon input { padding-left: 45px; }

/* Buttons */
.btn-primary {
  width: 100%;
  padding: 16px;
  background: linear-gradient(to right, #0284c7, #2563eb);
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
  transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); /* Smooth bounce */
  user-select: none;
}
.btn-primary:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4); }

/* Spinners & Success states */
.spinner-circle {
  width: 20px; height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top: 3px solid #fff; border-radius: 50%;
  animation: spin 0.8s linear infinite; display: none;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.loading .btn-text, .loading .btn-icon { display: none; }
.loading .spinner-circle { display: block; }
.success { background: #10b981 !important; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3) !important; }

/* --- ABOUT SCREEN (RIGHT SCREEN) --- */
.profile-img {
  width: 85px; 
  height: 85px;
  border-radius: 50%;
  object-fit: cover;
  margin: 10px auto 25px auto;
  display: block;
  border: 2px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
}

.info-card {
  background: #1b2333;
  margin: 0 20px 15px 20px;
  padding: 15px;
  border-radius: 16px;
  display: flex; align-items: center; gap: 15px;
  border: 1px solid rgba(255,255,255,0.05);
}
.card-icon-circle {
  background: #2a3441;
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #94a3b8;
}
.card-details h4 { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 3px; font-weight: 600;}
.card-details p { font-size: 15px; color: #fff; font-weight: 500; margin-bottom: 2px;}
.card-details span { font-size: 12px; color: #64748b; }

.admin-card {
  background: #1b2333;
  margin: 0 20px 15px 20px;
  padding: 20px 15px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}
.admin-card-title {
  display: flex; align-items: center; gap: 8px; color: #fff;
  font-size: 14px; font-weight: 700; margin-bottom: 15px;
}
.admin-card-title svg { color: #eab308; }

.footer-info { margin: 10px 25px; }
.footer-info a {
  display: flex; align-items: center; color: #94a3b8;
  font-size: 13px; font-weight: 600; text-decoration: none;
  transition: 0.2s ease; padding: 10px 0;
}
.footer-info a:hover, .footer-info a:active { color: #3b82f6; }
.footer-info a svg { margin-right: 8px; width: 18px; }
.highlight-blue { color: #3b82f6; margin-left: 4px; }

/* --- BOTTOM NAVIGATION --- */
.bottom-nav {
  position: absolute;
  bottom: 0; width: 100%;
  height: calc(65px + env(safe-area-inset-bottom)); /* iOS Safe Area Fix */
  padding-bottom: env(safe-area-inset-bottom);
  background: rgba(15, 21, 35, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: space-around;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 50;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #64748b; font-size: 11px; font-weight: 600;
  cursor: pointer; padding: 10px 20px; position: relative;
  transition: color 0.3s; height: 100%; user-select: none;
}
.nav-item svg { margin-bottom: 4px; transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
.nav-item:active svg { transform: scale(0.85); }
.nav-item.active { color: #3b82f6; }
.nav-item.active::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 40px; height: 3px; background: #3b82f6; border-radius: 0 0 4px 4px;
}

/* Error texts */
.error { color: #ef4444; font-size: 12px; font-weight: 600; margin-top: 10px; opacity: 0; text-align: center; transition: opacity 0.3s; }
.error.show { opacity: 1; }

/* Content container (iFrames) */
#content-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  height: 100dvh; background: #0d121c; z-index: 1000; display: none;
}

/* Floating Actions */
#floatingActions {
  position: fixed; 
  bottom: calc(30px + env(safe-area-inset-bottom)); 
  left: 50%; transform: translateX(-50%);
  width: 95%; max-width: 420px; display: none; z-index: 1001;
  background: rgba(27, 35, 51, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border-radius: 16px; padding: 5px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
  animation: slideUpFade 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
@keyframes slideUpFade {
  from { opacity: 0; transform: translate(-50%, 30px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.action-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 6px; border: none; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer;
  border-radius: 12px; transition: all 0.2s; user-select: none;
}
.action-btn:active { background: rgba(255,255,255,0.08); transform: scale(0.96); }
.action-btn:hover { color: #fff; }

/* Fixed Full Screen Modal */
#chatFullScreen {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; height: 100dvh;
  background: #0d121c; z-index: 9999;
  flex-direction: column;
  animation: slideUpChat 0.35s cubic-bezier(0.25, 1, 0.5, 1);
}

@keyframes slideUpChat {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.chat-header {
  padding: calc(15px + env(safe-area-inset-top)) 20px 15px 20px; 
  background: #1b2333; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 2;
}
.chat-close-btn { 
  background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; 
  padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; 
  transition: all 0.2s;
}
.chat-close-btn:active { background: #ef4444; color: #fff; transform: scale(0.95); }

iframe { color-scheme: dark; }
</style>
</head>

<body>

<script>
let isPanelOpen = false;

if(window.location.hash === '#panel') {
    history.replaceState(null, null, window.location.pathname);
}

// Smooth Tab Switcher
function switchView(view) {
  const loginView = document.getElementById('loginView');
  const aboutView = document.getElementById('aboutView');
  const navHome = document.getElementById('navHome');
  const navAbout = document.getElementById('navAbout');
  
  if(view === 'login') {
    aboutView.classList.remove('active');
    loginView.classList.add('active');
    navHome.classList.add('active');
    navAbout.classList.remove('active');
  } else {
    loginView.classList.remove('active');
    aboutView.classList.add('active');
    navHome.classList.remove('active');
    navAbout.classList.add('active');
  }
}

document.getElementById('key').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') { e.preventDefault(); login(); }
});
document.getElementById('adminPass').addEventListener('keypress', function (e) {
  if (e.key === 'Enter') { e.preventDefault(); verifyAdmin(); }
});

function createIframeWithPermissions(containerId) {
  const container = document.getElementById(containerId);
  if (!document.getElementById("appIframe")) {
      const iframe = document.createElement("iframe");
      iframe.id = "appIframe";
      iframe.setAttribute("allow", "fullscreen; clipboard-read; clipboard-write; camera; microphone");
      iframe.style.width = "100%"; iframe.style.height = "100%"; 
      iframe.style.border = "none"; iframe.style.background = "#0d121c";
      container.appendChild(iframe);
  }
  return document.getElementById("appIframe");
}

function login() {
  const keyInput = document.getElementById("key");
  const key = keyInput.value.trim();
  const loginBtn = document.getElementById("loginBtn");
  const errorText = document.getElementById("error");

  if (loginBtn.classList.contains("loading") || key === "") return;

  errorText.classList.remove("show");
  loginBtn.classList.remove("success");  loginBtn.classList.add("loading");
  loginBtn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbzBvcMQjvEYqG7ZOs-3qiJwNRVL6yKk1gQeu44T63QBUWh2WlacbUcf4wvEsCs_kEDt/exec?key=" + encodeURIComponent(key))
  .then(res => res.text())
  .then(data => {
    if(data.trim() === "valid") {
      loginBtn.classList.remove("loading");
      loginBtn.classList.add("success");
      loginBtn.innerHTML = '<span class="btn-text">SUCCESS</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>';
      
      setTimeout(() => {
        document.getElementById("mainApp").style.display = "none"; 
        const container = document.getElementById("content-container");
        container.style.display = "block"; 
        
        const iframe = createIframeWithPermissions("content-container");
        iframe.src = "https://gauravyt-admin--gaurav001op.replit.app//"; 
        
        document.getElementById("floatingActions").style.display = "flex"; 
        isPanelOpen = true;
        
        if(window.location.hash !== '#panel') {
            history.pushState({ page: 'panel' }, 'Panel', '#panel');
        }
      }, 1200);
    } else {
      resetButton(loginBtn, errorText, "Invalid Access Key");
    }
  })
  .catch(err => {
    resetButton(loginBtn, errorText, "Network Error");
  });
}

function verifyAdmin() {
  const pass = document.getElementById('adminPass').value;
  const errorText = document.getElementById('adminError');
  
  if (pass === "G") {
    window.open("https://gauravyt-admin--gaurav001op.replit.app/admin", "_blank");
    errorText.classList.remove('show');
    document.getElementById('adminPass').value = '';
  } else {
    errorText.innerText = "Incorrect Password!";
    errorText.classList.add('show');
    
    const box = document.querySelector('.admin-card');
    box.style.transform = "translateX(-5px)";
    setTimeout(() => box.style.transform = "translateX(5px)", 100);
    setTimeout(() => box.style.transform = "translateX(-5px)", 200);
    setTimeout(() => box.style.transform = "translateX(0)", 300);
  }
}

function resetButton(btn, errorEl, msg) {
  btn.classList.remove("loading");
  btn.disabled = false;
  btn.innerHTML = '<span class="btn-text">UNLOCK</span><svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg><div class="spinner-circle"></div>';
  errorEl.innerText = msg;
  errorEl.classList.add("show");
  
  const box = document.querySelector('.login-card');
  box.style.transform = "translateX(-10px)";
  setTimeout(() => box.style.transform = "translateX(10px)", 100);
  setTimeout(() => box.style.transform = "translateX(-10px)", 200);
  setTimeout(() => box.style.transform = "translateX(0)", 300);
}
